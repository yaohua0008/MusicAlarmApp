name: Build iOS App
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - run: cd ios && pod install --repo-update
      - run: |
          cd ios
          xcodebuild -workspace MusicAlarmApp.xcworkspace \
            -scheme MusicAlarmApp \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
      - if: success()
        uses: actions/upload-artifact@v3
        with:
          name: MusicAlarmApp-ipa
          path: ios/build/Release-iphoneos/MusicAlarmApp.app
