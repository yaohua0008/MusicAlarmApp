name: Build iOS App v3

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update
      
      - name: Build iOS app
        run: |
          cd ios
          xcodebuild \
            -workspace MusicAlarmApp.xcworkspace \
            -scheme MusicAlarmApp \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build
      
      - name: Package IPA
        if: success()
        run: |
          cd ios/build/Release-iphoneos
          mkdir -p Payload
          mv MusicAlarmApp.app Payload/
          zip -r ../../MusicAlarmApp-unsigned.ipa Payload/
      
      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: MusicAlarmApp-IPA
          path: ios/MusicAlarmApp-unsigned.ipa
          retention-days: 30
